<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#000000" />
    <title>La Mejor Abogada — Aventura</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #000;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: system-ui, sans-serif;
            color: #fff;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            overscroll-behavior: none;
        }
        #game {
            width: 100vw;
            height: 100vh;
            touch-action: none;
        }
        #game canvas {
            image-rendering: pixelated;
            display: block;
        }
        #help {
            position: fixed;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            opacity: .6;
            text-shadow: 0 0 4px #000;
            pointer-events: none;
        }
        /* Aviso de rotar el móvil cuando está en vertical */
        #rotate {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            color: #ffd54a;
            z-index: 9999;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 22px;
            padding: 20px;
        }
        @media (orientation: portrait) and (max-width: 900px) {
            #rotate { display: flex; }
            #help   { display: none; }
        }
    </style>
</head>
<body>
    <div id="game"></div>
    <div id="rotate">📱 Por favor gira tu teléfono en horizontal</div>
    <div id="help">← →  mover   ·   ESPACIO/↑  saltar (doble)   ·   F  disparar   ·   ↓  agacharse   ·   M  silenciar</div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script src="src/sfx.js"></script>
    <script src="src/levels.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
